<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KalaMudra - Kathak Mudra Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>🌺 KalaMudra 🌺</h1>
        <p>An Interactive Platform for Kathak Mudras</p>
    </header>
    
    <nav>
        <button id="libraryBtn" class="nav-btn active">Mudra Library</button>
        <button id="practiceBtn" class="nav-btn">Practice Mode</button>
        <button id="progressBtn" class="nav-btn">Progress</button>
    </nav>
    
    <main>
        <!-- Mudra Library -->
        <section id="library" class="page active">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search mudras...">
            </div>
            <div id="mudraList" class="mudra-grid"></div>
        </section>
        
        <!-- Mudra Details Modal -->
        <div id="mudraModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <img id="modalImg" src="" alt="">
                <h2 id="modalName"></h2>
                <p id="modalMeaning"></p>
                <p id="modalUsage"></p>
                <p id="modalHistory"></p>
                <button id="practiceFromModal">Practice This Mudra</button>
            </div>
        </div>
        
        <!-- Practice Mode -->
        <section id="practice" class="page">
            <div class="practice-header">
                <h2 id="practiceTitle">Select a Mudra to Practice</h2>
                <button id="startPractice">Start Practice</button>
                <button id="retryBtn" style="display:none;">Retry</button>
            </div>
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <div id="feedback" class="feedback"></div>
            </div>
            <div id="result" class="result"></div>
        </section>
        
        <!-- Progress -->
        <section id="progress" class="page">
            <h2>Your Progress</h2>
            <div id="progressList"></div>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
